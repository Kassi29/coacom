@if (totalPages() > 1) {
  <nav class="pagination">
    <button
      class="page-btn"
      [disabled]="!hasPrevious()"
      (click)="goPrevious()"
    >
      Anterior
    </button>

    @for (page of pages(); track page) {
      <button
        class="page-btn"
        [class.active]="page === currentPage()"
        (click)="goToPage(page)"
      >
        {{ page }}
      </button>
    }

    <button
      class="page-btn"
      [disabled]="!hasNext()"
      (click)="goNext()"
    >
      Siguiente
    </button>
  </nav>
}
