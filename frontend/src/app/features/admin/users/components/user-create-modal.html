<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-card">
    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">Crear Nuevo Usuario</h2>
      <button class="close-btn" (click)="handleClose()">
        <lucide-icon [img]="icons.x" [size]="18" color="#727272" />
      </button>
    </div>

    <div class="divider"></div>

    @if (errorMessage()) {
      <div class="error-alert">{{ errorMessage() }}</div>
    }

    <!-- Form Body -->
    <form [formGroup]="form" (ngSubmit)="handleSubmit()">
      <div class="modal-body">
        <!-- Name Row -->
        <div class="form-row">
          <div class="form-field">
            <label>Nombre</label>
            <input type="text" formControlName="firstName" placeholder="Nombre" />
          </div>
          <div class="form-field">
            <label>Apellido</label>
            <input type="text" formControlName="lastName" placeholder="Apellido" />
          </div>
        </div>

        <!-- Email -->
        <div class="form-field">
          <label>Correo Electronico</label>
          <div class="input-with-icon">
            <lucide-icon class="field-icon" [img]="icons.mail" [size]="16" color="#A3A3A3" />
            <input type="email" formControlName="email" placeholder="correo@coacom.com" />
          </div>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label>Contraseña temporal</label>
          <div class="input-with-icon">
            <input
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Mínimo 6 caracteres"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <lucide-icon [img]="showPassword() ? icons.eyeOff : icons.eye" [size]="16" color="#A3A3A3" />
            </button>
          </div>
          <span class="field-note">El usuario deberá cambiar su contraseña en el primer inicio de sesión</span>
        </div>

        <!-- Role -->
        <div class="form-field">
          <label>Rol</label>
          <select formControlName="role" (change)="onRoleChange()">
            <option value="">Seleccionar rol</option>
            @for (opt of roleOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>

        <!-- Branch (conditional) -->
        @if (showBranch()) {
          <div class="form-field">
            <label>Sucursal</label>
            <select formControlName="branchId">
              <option value="">Seleccionar sucursal</option>
              @for (b of branches(); track b.id) {
                <option [value]="b.id">{{ b.name }}</option>
              }
            </select>
            <span class="field-note">Solo requerido para Gerente Sucursal y Tecnico</span>
          </div>
        }

        <!-- Specialty (conditional) -->
        @if (showSpecialty()) {
          <div class="form-field">
            <label>Especialidad</label>
            <select formControlName="specialty">
              <option value="">Seleccionar especialidad</option>
              @for (esp of specialtyOptions; track esp) {
                <option [value]="esp">{{ esp }}</option>
              }
            </select>
            <span class="field-note">Solo visible para tecnicos</span>
          </div>
        }
      </div>

      <div class="divider"></div>

      <!-- Footer -->
      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="handleClose()">Cancelar</button>
        <button type="submit" class="btn-submit" [disabled]="isLoading()">
          @if (isLoading()) {
            Creando...
          } @else {
            Crear Usuario
          }
        </button>
      </div>
    </form>
  </div>
</div>
